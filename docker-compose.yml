version: '3.8'

# Role workers: one deployment per (role, AI server). Each polls its own
# server's health every 5s and consumes tasks for its role one at a time.
# Load balancing is emergent — whichever healthy worker is free claims the
# next task; a dead worker's unacked task is redelivered by the broker.
x-worker-base: &worker-base
  build: ./backend
  restart: unless-stopped
  command: worker
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    - rabbitmq

services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: bookreader
      RABBITMQ_DEFAULT_PASS: bookreader
    ports:
      # Host ports offset to avoid the unrelated broker already on 5672.
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  worker-tts:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: tts
      WORKER_SERVER_ID: tts
      WORKER_SERVER_LABEL: TTS
      WORKER_SERVER_URL: https://tts.kevyn.com.br

  worker-tts-macbook:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: tts
      WORKER_SERVER_ID: macbook
      WORKER_SERVER_LABEL: MacBook
      WORKER_SERVER_URL: http://host.docker.internal:8000

  worker-vlm:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: vlm
      WORKER_SERVER_ID: server
      WORKER_SERVER_LABEL: Server
      WORKER_SERVER_URL: https://qwenvl.kevyn.com.br
      WORKER_SERVER_MODEL: Qwen/Qwen2.5-VL-7B-Instruct-AWQ

  worker-vlm-macbook:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: vlm
      WORKER_SERVER_ID: macbook
      WORKER_SERVER_LABEL: MacBook
      WORKER_SERVER_URL: https://ollama-macbook.kevyn.com.br
      WORKER_SERVER_MODEL: qwen2.5vl:7b-q8_0

  worker-slm:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: slm
      WORKER_SERVER_ID: slm
      WORKER_SERVER_LABEL: SLM
      WORKER_SERVER_URL: https://slm.kevyn.com.br
      WORKER_SERVER_MODEL: gemma4:latest

  worker-slm-macbook:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: slm
      WORKER_SERVER_ID: macbook
      WORKER_SERVER_LABEL: MacBook
      WORKER_SERVER_URL: https://ollama-macbook.kevyn.com.br
      WORKER_SERVER_MODEL: gemma4:12b-mlx

  worker-whisper:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: whisper
      WORKER_SERVER_ID: whisper
      WORKER_SERVER_LABEL: Whisper
      WORKER_SERVER_URL: https://whisper.kevyn.com.br

  worker-whisper-macbook:
    <<: *worker-base
    environment:
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      WORKER_ROLE: whisper
      WORKER_SERVER_ID: macbook
      WORKER_SERVER_LABEL: MacBook
      WORKER_SERVER_URL: https://whisper-macbook.kevyn.com.br

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    # TTS_SERVERS (for the direct sample/voices endpoints) comes from
    # backend/.env; keys in `environment` override the env_file.
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/book-reader
      AMQP_URL: amqp://bookreader:bookreader@rabbitmq:5672/
      DATA_DIR: /app/data
      TTS_VOICE: ${TTS_VOICE:-pt-BR-FranciscaNeural}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-en}
      FRONTEND_ORIGIN: http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the container can reach the host TTS server
    volumes:
      - book-data:/app/data
    depends_on:
      - mongodb
      - rabbitmq


  frontend:
    image: node:20-slim
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3001
    volumes:
      - ./frontend:/app                   # live source edits
      - frontend_modules:/app/node_modules  # isolated from host

volumes:
  mongo-data:
  rabbitmq-data:
  book-data:
  frontend_modules:
