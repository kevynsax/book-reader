version: '3.8'

services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev   # installs poppler-utils; only rebuilt when this file changes
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/book-reader
      # Server lists (QWENVL_SERVERS for OCR, TTS_SERVERS for synthesis) are read
      # from backend/.env by dotenv, so config is identical across environments.
      DATA_DIR: /app/data
      TTS_VOICE: ${TTS_VOICE:-pt-BR-FranciscaNeural}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-en}
      FRONTEND_ORIGIN: http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the container can reach the host TTS server
    volumes:
      - ./backend:/app                  # live source edits
      - backend_modules:/app/node_modules  # isolated from host
      - book-data:/app/data
    depends_on:
      - mongodb

  frontend:
    image: node:20-slim
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3001
    volumes:
      - ./frontend:/app                   # live source edits
      - frontend_modules:/app/node_modules  # isolated from host

volumes:
  mongo-data:
  book-data:
  backend_modules:
  frontend_modules:
