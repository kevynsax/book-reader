version: '3.8'

services:

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev   # installs poppler-utils; only rebuilt when this file changes
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/book-reader
      QWENVL_API: ${QWENVL_API:-https://qwenvl.kevyn.com.br}
      QWENVL_MODEL: ${QWENVL_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct-AWQ}
      # Chatterbox TTS runs on the HOST (MLX needs the Mac GPU); reach it via host.docker.internal.
      TTS_API: ${TTS_API:-http://host.docker.internal:8000}
      DATA_DIR: /app/data
      TTS_VOICE: ${TTS_VOICE:-pt-BR-FranciscaNeural}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      TTS_LANGUAGE: ${TTS_LANGUAGE:-en}
      FRONTEND_ORIGIN: http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the container can reach the host TTS server
    volumes:
      - ./backend:/app                  # live source edits
      - backend_modules:/app/node_modules  # isolated from host
      - book-data:/app/data
    depends_on:
      - mongodb

  frontend:
    image: node:20-slim
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3001
    volumes:
      - ./frontend:/app                   # live source edits
      - frontend_modules:/app/node_modules  # isolated from host

volumes:
  mongo-data:
  book-data:
  backend_modules:
  frontend_modules:
