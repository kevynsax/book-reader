server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx's mime.types has no entry for .mjs, so ES module files (e.g. the
    # PDF.js worker) default to application/octet-stream, which browsers refuse
    # to load as a module/worker. Serve them as JavaScript.
    location ~ \.mjs$ {
        default_type text/javascript;
    }

    # REST API — long timeout for upload/OCR operations
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 1024m;
    }

    # Realtime — WebSocket upgrade
    location /ws {
        proxy_pass         http://backend:3001/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_cache_bypass $http_upgrade;
    }

    # React SPA — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
